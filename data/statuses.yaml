- key: live
  label: Live
  description: This feed is active and is continually publishing updates.
- key: stale
  label: Stale
  description: This feed has not published any updates in some time despite its host website having since updated.
- key: broken
  label: Broken
  description: This feed is still actively referenced by the host website but something about it appears to be broken.
- key: search
  label: Search
  description: This feed is built using search parameters. Visit the linked page to build a feed.
- key: authenticated
  label: Authenticated
  description: This feed requires some form of credential to access. Visit the linked page for more details.
- key: dead
  label: Dead
  description: This feed is still actively referenced by the host website but does not appear to work/exist anymore.
